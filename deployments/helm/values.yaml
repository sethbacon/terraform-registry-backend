---
# Default values for terraform-registry Helm chart

# -- Global settings
global:
  # -- Image pull secrets
  imagePullSecrets: []

# -- Backend configuration
backend:
  # -- Number of backend replicas
  replicaCount: 2
  image:
    # -- Backend image repository
    repository: terraform-registry-backend
    # -- Image tag (defaults to Chart.appVersion)
    tag: ""
    pullPolicy: IfNotPresent
  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Pod security context
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
  # -- Container security context
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Topology spread constraints for pod scheduling across zones/nodes
  topologySpreadConstraints: []
  # Example:
  #   - maxSkew: 1
  #     topologyKey: topology.kubernetes.io/zone
  #     whenUnsatisfiable: DoNotSchedule
  #     labelSelector:
  #       matchLabels:
  #         app.kubernetes.io/component: backend
  # -- Additional environment variables
  extraEnv: []
  # -- Additional volume mounts
  extraVolumeMounts: []
  # -- Additional volumes
  extraVolumes: []

# -- Frontend configuration
frontend:
  # -- Enable frontend deployment
  enabled: true
  # -- Number of frontend replicas
  replicaCount: 2
  image:
    repository: terraform-registry-frontend
    tag: "0.12.3"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  baseUrl: "https://registry.example.com"

# -- External database configuration
# No database is deployed by this chart; provide connection details
externalDatabase:
  host: ""
  port: 5432
  name: "terraform_registry"
  user: "registry"
  # -- Database password (ignored if existingSecret is set)
  password: ""
  sslMode: "require"
  maxConnections: 25
  # -- Use an existing secret containing TFR_DATABASE_PASSWORD key
  existingSecret: ""

# -- Storage configuration
storage:
  # -- Storage backend: local, s3, azure, gcs
  backend: "local"
  local:
    basePath: "/app/storage"
    serveDirectly: true
  s3:
    endpoint: ""
    region: ""
    bucket: ""
    authMethod: "default"
    accessKeyId: ""
    secretAccessKey: ""
    roleArn: ""
    webIdentityTokenFile: ""
  azure:
    accountName: ""
    accountKey: ""
    containerName: ""
  gcs:
    bucket: ""
    projectId: ""
    authMethod: "default"
    credentialsFile: ""
  # -- PVC settings (only used when backend is "local")
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    # -- Use an existing PVC
    existingClaim: ""

# -- Authentication configuration
auth:
  apiKeys:
    enabled: true
    prefix: "tfr_"
  oidc:
    enabled: false
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
    scopes:
      - openid
      - email
      - profile
  azureAd:
    enabled: false
    tenantId: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""

# -- Multi-tenancy
multiTenancy:
  enabled: false
  defaultOrganization: "default"

# -- Security
# IMPORTANT: For production deployments, use existingSecret (or Key Vault CSI /
# External Secrets Operator) instead of setting jwtSecret / encryptionKey here.
# Values passed via --set or in a values file are stored in plain text inside
# the Helm release Secret (sh.helm.release.v1.*), readable by anyone with
# get-secrets RBAC in the namespace.
security:
  # -- JWT secret (required, min 32 chars). Ignored if existingSecret is set.
  jwtSecret: ""
  # -- Path to a file containing the JWT secret. When set, the backend watches
  # the file for changes and hot-reloads the signing key without restart.
  # In Kubernetes, mount a Secret as a volume and set this to the mount path.
  # Example: /etc/secrets/jwt-secret
  jwtSecretFile: ""
  # -- Encryption key for sensitive data (32 bytes).
  # Ignored if existingSecret is set.
  encryptionKey: ""
  # -- Previous encryption key for zero-downtime rotation. When set, the backend
  # tries the current key first for decryption, then falls back to this key.
  # Remove after all encrypted data has been re-encrypted with the new key.
  encryptionKeyPrevious: ""
  # -- Use an existing secret containing TFR_JWT_SECRET and ENCRYPTION_KEY keys.
  # This is the recommended approach for production — it avoids storing secrets
  # in Helm release history. Create the Secret before installing the chart:
  #   kubectl create secret generic my-registry-secrets \
  #     --from-literal=TFR_JWT_SECRET="$(openssl rand -hex 32)" \
  #     --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 16)" \
  #     -n terraform-registry
  # Optionally also include ENCRYPTION_KEY_PREVIOUS for key rotation.
  existingSecret: ""
  rateLimiting:
    enabled: true
    requestsPerMinute: 60
    burst: 10
    # -- Per-organization aggregate rate limit (requires multi-tenancy).
    # Set to 0 to disable org-level limiting.
    orgRequestsPerMinute: 0
    orgBurst: 0
  cors:
    # -- Allowed CORS origins. Set to your registry's public URL in production.
    # Defaults to empty (no cross-origin requests allowed). Example:
    #   allowedOrigins: ["https://registry.example.com"]
    allowedOrigins: []

# -- Redis configuration (optional, enables HA features)
# When redis.host is set, rate limiting uses distributed GCRA in Redis and
# OIDC session state is stored in Redis -- both required for correct behavior
# behind a load balancer with multiple pods.
# When redis.host is empty, the backend falls back to in-memory stores.
redis:
  # -- Redis host (leave empty to use in-memory fallback)
  host: ""
  # -- Redis port
  port: 6379
  # -- Redis password (ignored if existingSecret is set)
  password: ""
  # -- Redis database number
  db: 0
  # -- Enable TLS for Redis connection (required for Azure Cache for Redis)
  tls: false
  # -- Connection pool size per backend instance
  poolSize: 10
  # -- Connection timeout
  dialTimeout: "5s"
  # -- Use an existing secret containing REDIS_PASSWORD key
  existingSecret: ""

# -- Logging
logging:
  level: "info"
  format: "json"

# -- Telemetry
telemetry:
  enabled: true
  metrics:
    enabled: true
    prometheusPort: 9090

# -- Service configuration
service:
  backend:
    type: ClusterIP
    port: 8080
    metricsPort: 9090
  frontend:
    type: ClusterIP
    port: 80

# -- Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: registry.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: terraform-registry-tls
      hosts:
        - registry.example.com

# -- ServiceAccount
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Prometheus ServiceMonitor (if using prometheus-operator)
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

# -- PrometheusRule for alerting (if using prometheus-operator)
prometheusRule:
  enabled: false
  labels: {}

# -- Module security scanning configuration
scanning:
  # -- Enable module security scanning
  enabled: false
  # -- Scanner tool: trivy, terrascan, snyk, checkov, custom
  tool: "trivy"
  # -- Absolute path to scanner binary inside the container
  binaryPath: "/usr/local/bin/trivy"
  # -- Pin expected binary version
  # (supply-chain protection; leave empty to skip check)
  expectedVersion: ""
  # -- Scan timeout duration
  timeout: "5m"
  # -- Number of concurrent scan workers
  workerCount: 2
  # -- How often (minutes) the scanner polls for pending scans
  scanIntervalMins: 5
  # -- Directory where the auto-install button places scanner binaries.
  #    For production, mount a PersistentVolumeClaim at this path so binaries
  #    survive pod restarts. Leave empty to disable auto-install.
  installDir: "/app/scanners"

# -- Audit logging configuration
audit:
  # -- Enable audit logging
  enabled: true
  # -- Log read (GET) operations
  logReadOperations: false
  # -- Log failed requests (4xx/5xx)
  logFailedRequests: true
  # -- External audit log shippers
  shippers: []
  # Example:
  #   - enabled: true
  #     type: webhook
  #     webhook:
  #       url: "https://siem.example.com/audit"
  #       headers:
  #         Authorization: "Bearer token"
  #       timeoutSecs: 10
  #       batchSize: 100
  #       flushIntervalSecs: 30

  # -- Backup configuration (optional pg_dump CronJob)
backup:
  # -- Enable the backup CronJob
  enabled: false
  # -- Cron schedule expression (default: daily at 02:00 UTC)
  schedule: "0 2 * * *"
  # -- Destination for backup uploads: s3, azure, gcs, or local (PVC)
  destination: "s3"
  # -- S3/Azure/GCS bucket or container name for backup storage
  bucket: ""
  # -- S3/GCS region
  region: ""
  # -- Path prefix inside the bucket
  prefix: "backups/terraform-registry"
  # -- Image used for the backup job (must include pg_dump and cloud CLI)
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # -- Resource requests and limits for backup pods
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Number of successful job runs to retain
  successfulJobsHistoryLimit: 3
  # -- Number of failed job runs to retain
  failedJobsHistoryLimit: 3

# -- Grafana dashboard ConfigMap
# (auto-provisioned when using the Grafana sidecar)
grafanaDashboard:
  enabled: false
  labels: {}
  # Example: if using the Grafana Helm chart sidecar, set the label it watches:
  #   labels:
  #     grafana_dashboard: "1"

  # -- Kubernetes Gateway API
  # Supports AKS (Application Gateway for Containers), AWS EKS (ALB Controller),
  # GKE (built-in Gateway), and any other Gateway API-compliant implementation.
  # When gatewayAPI.enabled=true, set ingress.enabled=false to avoid deploying
  # the legacy nginx Ingress resource alongside Gateway API resources.
gatewayAPI:
  # -- Enable Gateway API resources
  # (GatewayClass, Gateway, HTTPRoute, ClusterIssuers, Certificate)
  enabled: false
  # -- Create a GatewayClass resource. Set false for GKE,
  # which pre-provisions GatewayClasses
  # (gke-l7-global-external-managed, etc.) —
  # no user GatewayClass needed.
  # Set true for AKS (AGfC) and EKS (AWS LBC)
  # which require a user-created GatewayClass.
  createGatewayClass: true
  # -- GatewayClass name.
  # AKS/AGfC:    azure-alb-external
  #              (or azure-alb-internal for private)
  # EKS/AWS LBC: aws-alb-external
  #              (or any name you choose)
  # GKE:         gke-l7-global-external-managed
  #              (pre-provisioned, no createGatewayClass)
  gatewayClassName: azure-alb-external
  # -- GatewayClass controller name.
  # Only used when createGatewayClass: true.
  # AKS/AGfC: alb.networking.azure.io/alb-controller
  # EKS/AWS:   gateway.k8s.aws/alb
  # GKE:      (not needed — set createGatewayClass: false)
  controllerName: "alb.networking.azure.io/alb-controller"
  # -- AKS/AGfC only: ARM resource ID of the
  # Application Gateway for Containers resource.
  # Format: /subscriptions/<SUB>/resourceGroups/<RG>/providers/
  #         Microsoft.ServiceNetworking/trafficControllers/<AGFC_NAME>
  # Leave empty for EKS and GKE.
  albId: ""
  # -- Additional annotations to merge onto the
  # Gateway resource.
  # Use for provider-specific annotations not
  # covered by albId above.
  # Example for EKS:
  #   service.beta.kubernetes.io/
  #   aws-load-balancer-scheme: internet-facing
  # Example for GKE:
  #   networking.gke.io/certmap: my-cert-map
  gatewayAnnotations: {}
  # -- Public hostname for the registry
  # (must match your DNS record and TLS certificate)
  hostname: "registry.example.com"
  # -- cert-manager ClusterIssuer name for
  # automatic TLS provisioning.
  # Use letsencrypt-staging during testing;
  # switch to letsencrypt-prod for production.
  certManagerIssuer: "letsencrypt-staging"
  # -- Name of the TLS Secret created by cert-manager.
  # Must match the Gateway listener's certificateRefs[].name.
  tlsSecretName: "terraform-registry-tls"
  # -- Email address for Let's Encrypt
  # certificate expiry notifications (required)
  email: ""

# -- Azure Key Vault + Secrets Store CSI Driver (AKS-specific)
# When enabled, creates a SecretProviderClass that syncs secrets from Azure Key
# Vault into the terraform-registry-secrets Kubernetes Secret at pod startup.
# The backend Deployment gets a CSI volume and mount injected automatically.
# Requires: AKS Secrets Store CSI Driver add-on + Azure Workload Identity.
#
# For AWS EKS or GCP GKE: use backend.extraVolumes + backend.extraVolumeMounts
# to mount a cloud-specific SecretProviderClass applied separately (or via the
# Kustomize overlays in overlays/eks/ or overlays/gke/).
keyVault:
  # -- Enable Azure Key Vault CSI Driver integration
  enabled: false
  # -- Azure Key Vault resource name
  # (not full URI — just the vault name)
  name: ""
  # -- Azure AD Tenant ID (UUID)
  tenantId: ""
  # -- Client ID of the User-Assigned Managed
  # Identity used for Key Vault access.
  # Must match workloadIdentity.clientId
  # if workloadIdentity is also enabled.
  clientId: ""

# -- Azure Workload Identity (AKS-specific)
# When enabled, adds the azure.workload.identity/client-id annotation to the
# ServiceAccount so the Workload Identity webhook injects OIDC tokens into pods.
# A federated credential must be configured on the managed identity pointing to
# this ServiceAccount (see docs/deployment/aks-prerequisites.md).
#
# For AWS EKS:  use serviceAccount.annotations
#   with eks.amazonaws.com/role-arn
# For GCP GKE:  use serviceAccount.annotations
#   with iam.gke.io/gcp-service-account
workloadIdentity:
  # -- Enable Azure Workload Identity annotation on ServiceAccount
  enabled: false
  # -- Client ID of the User-Assigned Managed Identity (UUID)
  clientId: ""

# -- Kubernetes NetworkPolicy
# When enabled, creates a default-deny-ingress policy for the namespace with
# explicit allow rules for frontend HTTP, backend API, and Prometheus metrics.
# Requires a CNI that supports NetworkPolicy: Azure CNI, Calico, Cilium, etc.
# Kubenet clusters do NOT enforce NetworkPolicy — the resources are accepted but
# ignored. Set enabled: false if your cluster uses kubenet.
networkPolicy:
  # -- Enable NetworkPolicy resources (recommended for production)
  enabled: true
  # -- Namespace label value where Prometheus /
  # metrics scraper runs. Used to allow scraping
  # backend port 9090. Set to match your
  # monitoring namespace.
  prometheusNamespace: "monitoring"
