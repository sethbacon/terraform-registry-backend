# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: terraform-registry
    dir: backend
    main: ./cmd/server
    binary: terraform-registry
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.BuildDate={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: registry-import
    dir: backend
    main: ./cmd/registry-import
    binary: registry-import
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: terraform-registry-binaries
    formats: [ binary ]
    name_template: "terraform-registry-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Release creation is disabled here because the repository has GitHub's
# Immutable Releases feature enabled, which freezes a release (including
# drafts) at the moment of creation. We need SLSA L3 binary provenance
# (multiple.intoto.jsonl) attached at the same time as the binaries, so the
# release is created atomically by the publish-release job in release.yml
# AFTER all artifacts and provenance files are produced.
release:
  disable: true

sboms:
  - artifacts: archive
    cmd: syft

signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}

docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - --yes
      - ${artifact}

changelog:
  use: github-native

gomod:
  proxy: false

snapshot:
  version_template: "{{ .Tag }}-dev"
