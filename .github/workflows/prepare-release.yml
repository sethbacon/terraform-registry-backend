name: Prepare Release

# Automates the release preparation steps:
#   1. Collects changelog entries from merged PR bodies
#   2. Updates CHANGELOG.md (promotes [Unreleased] to new version)
#   3. Pushes to a release branch and opens a PR to main
#
# Usage: dispatch manually with the desired version (e.g., 0.4.0).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without 'v' prefix (e.g., 0.4.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release v${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$'; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z or X.Y.Z-pre.N)"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi

      - name: Collect changelog entries
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/collect-changelog.sh
          ENTRIES=$(.github/scripts/collect-changelog.sh "" "${{ inputs.version }}")
          echo "$ENTRIES" > /tmp/changelog-block.md
          echo "Collected changelog:"
          cat /tmp/changelog-block.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          TODAY=$(date -u +%Y-%m-%d)

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found"
            exit 1
          fi

          if grep -q '## \[Unreleased\]' CHANGELOG.md; then
            sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $TODAY/" CHANGELOG.md
          else
            sed -i "1a\\\\n## [Unreleased]\\n\\n## [$VERSION] - $TODAY" CHANGELOG.md
          fi

          if [ -s /tmp/changelog-block.md ]; then
            CONTENT=$(tail -n +2 /tmp/changelog-block.md)
            if [ -n "$CONTENT" ]; then
              python3 -c "
          import re, sys
          version = '$VERSION'
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          with open('/tmp/changelog-block.md', 'r') as f:
              block = f.read().strip()
          lines = block.split('\n')
          section_content = '\n'.join(lines[1:]).strip()
          if section_content:
              pattern = f'## [{re.escape(version)}] - \\d{{4}}-\\d{{2}}-\\d{{2}}'
              replacement = f'## [{version}] - $(date -u +%Y-%m-%d)\n{section_content}'
              content = re.sub(pattern, replacement, content, count=1)
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          "
            fi
          fi

      - name: Bump Helm chart appVersion
        run: |
          VERSION="${{ inputs.version }}"
          # Update appVersion in Chart.yaml to match the release version.
          # Also bump the chart version patch component so Helm detects a change.
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deployments/helm/Chart.yaml
          echo "Updated deployments/helm/Chart.yaml appVersion to ${VERSION}"

      - name: Create release branch, commit, and push
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md deployments/helm/Chart.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: release v${VERSION}"
          # Rebase onto latest main to avoid merge conflicts from concurrent
          # feature merges landing between branch creation and PR merge.
          git fetch origin main
          git rebase origin/main
          git push origin "$BRANCH"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          This PR merges release preparation into \`main\` for release v${VERSION}.

          ### Checklist
          - [ ] CHANGELOG.md updated with collected entries
          - [ ] Helm \`Chart.yaml\` appVersion matches \`${VERSION}\`
          - [ ] CI passes
          - [ ] UAT: local Docker Compose build validated

          > **Merge this PR using a merge commit** (not squash). After merge, \`auto-tag.yml\`
          > will automatically create and push the \`v${VERSION}\` tag, triggering the release
          > workflow. Then merge \`main\` back into \`development\` to sync the version bump.
          EOF
          )"
