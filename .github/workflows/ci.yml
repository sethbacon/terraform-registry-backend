name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call: {} # allows release.yml and weekly-security.yml to call this

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push auto-generated swagger.json back to the branch
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go toolchain
        uses: ./.github/actions/setup-backend

      - name: Check go mod tidy
        working-directory: backend
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod or go.sum is out of date — run 'go mod tidy' and commit the result"
            exit 1
          fi

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Lint
        run: |
          cd backend
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...

      - name: Install swag
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          export GOBIN="$GITHUB_WORKSPACE/bin"
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install docs tooling (swagger2openapi)
        run: npm ci

      - name: Swagger generation (auto-commit if changed)
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On tag refs (release builds) skip swagger validation — it was already
          # checked when the release PR CI ran.  Tags are immutable so we cannot
          # auto-commit anyway.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Running on tag ${{ github.ref_name }} — skipping swagger auto-commit check"
            exit 0
          fi

          swag init -g cmd/server/main.go --outputTypes json
          # Convert Swagger 2.0 -> OpenAPI 3 for downstream consumers (frontend
          # typegen, terraform-provider-registry oapi-codegen). swag itself only
          # emits Swagger 2.0; this conversion keeps both files in lockstep.
          # swagger2openapi is pinned in the repo-root package.json/package-lock.json
          # (installed via the "Install docs tooling" step above); node_modules lives
          # at the repo root, one level up from this backend/ working directory.
          ../node_modules/.bin/swagger2openapi docs/swagger.json -o docs/openapi3.json -p
          if ! git diff --exit-code docs/swagger.json docs/openapi3.json; then
            echo "swagger.json or openapi3.json changed — committing updated docs"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/swagger.json docs/openapi3.json
            git commit -m "chore: regenerate swagger.json and openapi3.json [skip ci]"
            # Push back to the source branch (works for both PRs and direct pushes).
            # GITHUB_HEAD_REF is set for pull_request events; GITHUB_REF_NAME is used otherwise.
            TARGET_BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            # Fetch and rebase before pushing so concurrent commits to the same branch
            # (e.g. two PR squash-merges landing seconds apart) don't cause a rejected push.
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
            git push origin "HEAD:refs/heads/${TARGET_BRANCH}"
          else
            echo "swagger.json and openapi3.json are up-to-date — nothing to commit"
          fi

      - name: Run Go tests (with coverage)
        working-directory: backend
        run: |
          go clean -testcache
          go test ./internal/... ./pkg/... -race -coverprofile=coverage.out -covermode=atomic

      - name: Filter integration-only functions from coverage
        working-directory: backend
        # Functions whose doc comment contains a `coverage:skip:` marker are
        # excluded from the unit-test coverage denominator. Such functions
        # require a live external dependency (DB, SCM, OIDC issuer, scanner,
        # upstream HTTP registry) to exercise and are covered by the
        # integration suite in cmd/api-test / docker-compose.test.yml.
        run:
          go run ./scripts/coverfilter -in coverage.out -out coverage.filtered.out
          -root .

      - name: Check coverage threshold
        working-directory: backend
        # Coverage targets follow a risk-based approach (Google / Graphite benchmarks):
        #   - Security & core business logic (auth, middleware, repositories): target 85-95%
        #   - APIs & handlers: target 75-85%
        #   - Utilities & helpers: target 70-80%
        #   - Overall floor: 80% (target 85% by Phase 5 / H5.2 milestone)
        # The threshold below is the hard CI floor; the build fails if coverage drops below it.
        run: |
          THRESHOLD=80
          COVERAGE=$(go tool cover -func=coverage.filtered.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Coverage (filtered): ${COVERAGE}%  (threshold: ${THRESHOLD}%)"
          awk -v cov="$COVERAGE" -v thr="$THRESHOLD" 'BEGIN {
            if (cov + 0 < thr + 0) {
              print "FAIL: " cov "% is below the " thr "% minimum threshold."
              print "See docs/development.md for coverage guidelines and improvement targets."
              exit 1
            }
            print "PASS: " cov "% meets the " thr "% threshold."
          }'

      - name: Per-package coverage check
        run: |
          cd backend
          chmod +x scripts/check_package_coverage.sh
          ./scripts/check_package_coverage.sh

      - name: "List coverage:skip: markers (informational)"
        # Non-gating — coverage:skip: excludes a function from the unit-test coverage
        # denominator with no automated check that the exclusion is genuine. This
        # publishes the full list to the job summary each run so growth in the
        # exclusion list is visible for periodic manual review (issue #566 [51]).
        working-directory: backend
        run: |
          {
            echo "## coverage:skip: marked functions"
            echo ""
            echo '```'
            go run ./scripts/coverfilter -list -root .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-coverage
          path: backend/coverage.out

      - name: Compute coverage badge inputs
        # Only update the badge on pushes to main — not on PRs.
        if: github.event_name == 'push'
        id: badge
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.filtered.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "percent=${COVERAGE}" >> $GITHUB_OUTPUT
          if awk "BEGIN {exit !(${COVERAGE} >= 85)}"; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 70)}"; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 60)}"; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge gist
        # Requires:
        #   secrets.GIST_TOKEN  — GitHub PAT with the 'gist' scope
        #   vars.COVERAGE_GIST_ID — ID of a pre-created public gist (any file in it will do)
        # Once set, the action writes / overwrites 'coverage.json' in that gist, which the
        # shields.io endpoint badge in README.md reads.
        if: github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: Coverage
          message: ${{ steps.badge.outputs.percent }}%
          color: ${{ steps.badge.outputs.color }}

  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    # Run in parallel with backend-test — no dependency needed.
    # Needs issues:write to open a GitHub issue when new findings are detected.
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go toolchain
        uses: ./.github/actions/setup-backend
        with:
          install-gosec: "true"

      - name: Run gosec
        working-directory: backend
        # No -exclude flags: false positives and accepted risks are suppressed inline
        # with // #nosec <rule> -- <justification> annotations (see gosec-report.md).
        # gosec exits non-zero when findings exist; we capture that via the compare step.
        run: gosec -fmt json -out gosec-results.json ./... || true

      - name: Compare against baseline
        id: compare
        working-directory: backend
        # Exits 0 → no new findings. Exits 1 → new findings; issue body written to /tmp/issue-body.md.
        run: |
          python3 scripts/gosec-compare.py \
            --results  gosec-results.json \
            --baseline gosec-baseline.json \
            --base-dir . \
            --output   /tmp/issue-body.md
        continue-on-error: true

      - name: Open GitHub issue for new findings
        if: steps.compare.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure labels exist (idempotent — --force updates if already present).
          gh label create "security"  --color "d73a4a" --description "Security finding"          --repo "$GITHUB_REPOSITORY" --force || true
          gh label create "automated" --color "0075ca" --description "Created automatically by CI" --repo "$GITHUB_REPOSITORY" --force || true

          TITLE="security: new gosec findings on ${GITHUB_REF_NAME} ($(date -u +%Y-%m-%d))"
          # Avoid duplicate open issues for the same branch/day.
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "security,automated" \
            --search "gosec ${GITHUB_REF_NAME}" \
            --json number \
            --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            echo "An open gosec issue already exists for this branch — skipping duplicate creation."
            exit 0
          fi
          gh issue create \
            --repo  "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --body-file /tmp/issue-body.md \
            --label "security,automated"

      - name: Fail job if new findings detected
        if: steps.compare.outcome == 'failure'
        run: |
          echo "New gosec findings detected — see the GitHub issue created above."
          echo "Fix or suppress findings with // #nosec <rule> -- <reason>, then update gosec-baseline.json:"
          echo "  bash backend/scripts/update-gosec-baseline.sh"
          exit 1

      - name: Upload gosec results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gosec-results
          path: backend/gosec-results.json

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Build backend Docker image
        run: docker build -t terraform-registry-backend:ci backend/

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: backend/
          severity: HIGH,CRITICAL
          # Only fail on vulnerabilities that have a fix available; un-actionable
          # (no-fix-yet) CVEs shouldn't block CI.
          ignore-unfixed: true
          exit-code: 1
          format: table

      - name: Verify image starts (health check smoke test)
        run: |
          # Start the container with DEV_MODE so it doesn't require a live database for the health probe.
          docker run -d \
            --name registry-smoke \
            -e DEV_MODE=true \
            -e TFR_DATABASE_HOST=nonexistent \
            -p 18080:8080 \
            terraform-registry-backend:ci || true
          # Give it 5 seconds and check it didn't immediately crash.
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Status}}' registry-smoke 2>/dev/null || echo "missing")
          echo "Container status: $STATUS"
          docker rm -f registry-smoke 2>/dev/null || true
          # Container exits fast (can't connect to DB) — that is expected; we just want build
          # to succeed, not crash at process startup. Status "exited" is acceptable here.
          if [ "$STATUS" = "missing" ]; then
            echo "Container never started — Docker build artifact broken"
            exit 1
          fi

  deployment-validate:
    name: Deployment Config Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Validate Docker Compose configs
        working-directory: deployments
        run: |
          # docker-compose.prod.yml requires .env.production to exist (env_file directive).
          # Touch a stub so compose config doesn't fail on a missing file.
          touch .env.production
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          docker compose -f docker-compose.test.yml config --quiet

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: "latest"

      - name: Helm lint
        run: |
          helm lint deployments/helm/ \
            --set config.baseUrl=https://registry.example.com \
            --set config.jwtSecret=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            --set config.databasePassword=password \
            --set config.encryptionKey=00000000000000000000000000000000

      - name: CSP nonce guard (frontend header == <meta>)
        # Renders the frontend nginx ConfigMap, serves it with nginx, and asserts
        # the CSP response-header nonce equals the served <meta> nonce — guarding
        # the regression that rendered the SPA unstyled under the strict CSP.
        run: bash deployments/helm/verify-csp-nonce.sh

      - name: Kustomize validate (dev overlay)
        run: kubectl kustomize deployments/kubernetes/overlays/dev > /dev/null

      - name: Kustomize validate (production overlay)
        run: kubectl kustomize deployments/kubernetes/overlays/production > /dev/null

      - name: Install Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: latest

      - name: Terraform validate (AWS)
        working-directory: deployments/terraform/aws
        run: terraform init -backend=false && terraform validate

      - name: Terraform validate (Azure)
        working-directory: deployments/terraform/azure
        run: terraform init -backend=false && terraform validate

      - name: Terraform validate (GCP)
        working-directory: deployments/terraform/gcp
        run: terraform init -backend=false && terraform validate

  # ── CodeQL Analysis ───────────────────────────────────────────────────────
  # Runs on every PR and push to main (not just the weekly schedule in
  # weekly-security.yml) so vulnerable code can't reach main unscanned for up
  # to a week; the weekly run remains as a defense-in-depth backstop.
  codeql:
    name: CodeQL Analysis (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go toolchain
        uses: ./.github/actions/setup-backend

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          languages: go

      - name: Build for CodeQL
        working-directory: backend
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          category: /language:go
