name: Release

# Publish versioned binaries and a Docker image whenever a semver tag is
# pushed.  Tags must match `v*.*.*` (e.g., v1.2.3, v0.10.0-rc.1).
#
# Artifacts produced:
#   - Multi-platform Go binaries attached to the GitHub Release (via GoReleaser)
#   - SHA-256 checksum file (checksums.txt)
#   - Deployment configs tarball attached to the GitHub Release
#   - Docker image pushed to ghcr.io (tagged with version + latest)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/terraform-registry-backend

jobs:
  # ── Branch guard — releases must originate from main ─────────────────────
  # GitHub Actions has no native way to filter tags by branch.  This job
  # fetches origin/main and verifies that the tagged commit is an ancestor of
  # (i.e. reachable from) main.  All downstream jobs depend on this one, so a
  # tag pushed on any other branch fails fast without building any artifacts.
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0 # need full history to walk ancestry

      - name: Check tagged commit is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must be pushed on the main branch." \
                 "This tag points to a commit that is not in origin/main."
            exit 1
          fi
          echo "✅ Tag is on main — proceeding with release."

  # ── CI gate — full test suite must pass before any release artifact is built ──
  ci:
    name: CI
    needs: guard
    secrets: inherit # passes GIST_TOKEN (coverage badge) and other secrets to the reusable workflow
    uses: ./.github/workflows/ci.yml

  # ── Build binaries + create GitHub Release ───────────────────────────────
  goreleaser:
    name: GoReleaser — binaries + GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write # required to create releases and upload assets
      id-token: write # required for Sigstore OIDC
      attestations: write # required for GitHub build provenance attestation

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0 # GoReleaser needs full history to resolve previous tag

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Package deployment configs
        run: tar -czf "/tmp/deployment-configs-${GITHUB_REF_NAME}.tar.gz" deployments/

      - name: Run GoReleaser (build only — release creation deferred)
        id: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage deployment configs into dist/
        run: cp "/tmp/deployment-configs-${GITHUB_REF_NAME}.tar.gz" dist/

      - name: Stage curated release assets
        # GoReleaser's `format: binary` archive entries don't actually create a
        # renamed file on disk — the artifacts.json entry just points back at
        # the binary inside the per-target build dir (e.g.
        # dist/terraform-registry_linux_amd64_v1/terraform-registry). We must
        # copy each binary to its published name explicitly. We also exclude
        # GoReleaser internals (artifacts.json, metadata.json, config.yaml,
        # digests.txt, CHANGELOG.md, the per-target build subdirs) so they
        # don't end up as release assets and so empty files don't trip the
        # release-create upload (HTTP 400 on Content-Length: 0).
        run: |
          set -euo pipefail
          mkdir -p release
          # Copy renamed binaries by reading the goreleaser artifacts manifest.
          jq -r '.[] | select(.type=="Binary" and .extra.Format=="binary") | "\(.path)\t\(.name)"' \
            dist/artifacts.json | while IFS=$'\t' read -r src name; do
              cp "$src" "release/$name"
          done
          cp dist/checksums.txt release/
          cp dist/checksums.txt.sigstore.json release/
          cp "dist/deployment-configs-${GITHUB_REF_NAME}.tar.gz" release/
          ls -la release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts
          path: release/
          retention-days: 1
          if-no-files-found: error

      - name: Attest build provenance (binaries)
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-path: "release/*"

  # ── Build + push Docker image ────────────────────────────────────────────
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
      id-token: write # required for Sigstore OIDC (cosign keyless signing)
      attestations: write # required for GitHub build provenance attestation

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend/
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy image scan (published digest)
        # ci.yml's fs-scan only covers the source tree/go.sum on the local build-smoke-test
        # image, not the actual multi-arch image published here — scan the real pushed
        # digest for OS-package and dependency CVEs before it's signed/attested.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: image-sbom.spdx.json

      - name: Upload container SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-sbom
          path: image-sbom.spdx.json
          retention-days: 90

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{
          steps.build.outputs.digest }}"

      - name: Attest build provenance (container)
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Print verification commands
        run: |
          echo "## Supply-chain verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify cosign signature" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp 'https://github\\.com/${{ github.repository_owner }}/terraform-registry-backend/' \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify build provenance" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "gh attestation verify \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --repo ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Build + push FIPS-140-3 Docker image ─────────────────────────────────
  # BoringCrypto-linked variant (backend/Dockerfile.fips) for FIPS-constrained
  # environments. Mirrors the `docker` job above; only the Dockerfile and tag
  # suffix differ.
  docker-fips:
    name: Publish FIPS Docker image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
      id-token: write # required for Sigstore OIDC (cosign keyless signing)
      attestations: write # required for GitHub build provenance attestation

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (FIPS)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-fips
            type=semver,pattern={{major}}.{{minor}}-fips
            type=semver,pattern={{major}}-fips
            type=raw,value=fips,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend/
          file: backend/Dockerfile.fips
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy image scan (published digest)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: image-sbom-fips.spdx.json

      - name: Upload container SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-sbom-fips
          path: image-sbom-fips.spdx.json
          retention-days: 90

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{
          steps.build.outputs.digest }}"

      - name: Attest build provenance (container)
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Print verification commands
        run: |
          echo "## Supply-chain verification (FIPS image)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify cosign signature" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp 'https://github\\.com/${{ github.repository_owner }}/terraform-registry-backend/' \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify build provenance" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "gh attestation verify \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --repo ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Publish the GitHub Release ────────────────────────────────────────────
  # release-please creates a DRAFT GitHub Release (with changelog) when the
  # release PR is merged (configured via "draft": true in
  # .release-please-config.json).  Draft releases are not subject to the
  # Immutable Releases restriction, so we can upload assets freely.  Once
  # all assets are attached we publish the draft, which makes it immutable.
  #
  # If no draft release exists (e.g. manual workflow_dispatch), we create
  # the release from scratch using `gh release create`, which internally
  # uses a draft→upload→publish flow that is also Immutable-Releases-safe.
  #
  # Build provenance is stored in the GitHub attestation API (not as a
  # release asset) and can be verified with `gh attestation verify`.
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [goreleaser, docker, docker-fips]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download release artifacts (binaries, checksums, sigs, deployment configs)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-artifacts
          path: release/

      - name: List release assets
        run: ls -la release/

      - name: Upload assets and publish GitHub Release
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          DOCKER_NOTES="## Docker Image

          \`\`\`
          docker pull ghcr.io/${GITHUB_REPOSITORY_OWNER}/terraform-registry-backend:${TAG}
          \`\`\`

          ## FIPS-140-3 Docker Image

          BoringCrypto-linked variant for FIPS-constrained environments (see backend/Dockerfile.fips).

          \`\`\`
          docker pull ghcr.io/${GITHUB_REPOSITORY_OWNER}/terraform-registry-backend:${TAG#v}-fips
          \`\`\`

          ## Supply-chain verification

          Build provenance is attested via GitHub Artifact Attestations and both images are signed with cosign (keyless, Sigstore) — substitute the FIPS tag above to verify that image instead.

          \`\`\`bash
          # Verify binary provenance
          gh attestation verify <binary-file> --repo ${REPO}

          # Verify container provenance
          gh attestation verify oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/terraform-registry-backend:${TAG} --repo ${REPO}

          # Verify cosign signature
          cosign verify \\\\
            --certificate-identity-regexp 'https://github\\.com/${GITHUB_REPOSITORY_OWNER}/terraform-registry-backend/' \\\\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\
            ghcr.io/${GITHUB_REPOSITORY_OWNER}/terraform-registry-backend:${TAG}
          \`\`\`"

          # Check whether release-please already created a draft release for
          # this tag.  If so, upload assets to the draft, append notes, and
          # publish.  Otherwise create the release from scratch.
          if gh release view "${TAG}" --repo "${REPO}" > /dev/null 2>&1; then
            echo "Draft release found — uploading assets and publishing."
            gh release upload "${TAG}" \
              --repo "${REPO}" \
              --clobber \
              release/*

            EXISTING_BODY="$(gh release view "${TAG}" \
              --repo "${REPO}" --json body -q .body)"

            gh release edit "${TAG}" \
              --repo "${REPO}" \
              --draft=false \
              --notes "${EXISTING_BODY}

          ${DOCKER_NOTES}"
          else
            echo "No existing release — creating release with assets."
            # Extract changelog section for this version from CHANGELOG.md
            CHANGELOG_BODY="$(sed -n "/^## \\[${TAG#v}\\]/,/^## \\[/{ /^## \\[${TAG#v}\\]/d; /^## \\[/d; p; }" CHANGELOG.md)"

            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes "${CHANGELOG_BODY}

          ${DOCKER_NOTES}" \
              release/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Wiki sync runs in its own workflow (.github/workflows/wiki-sync.yml)
  # and is triggered by the release event so the wiki version badge and
  # all documentation pages are refreshed together.
