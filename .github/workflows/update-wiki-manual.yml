name: Update Wiki Version (Manual)

# Manual fallback for updating the wiki version badge when the automatic
# update in release.yml fails or needs to be re-run for a specific version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to set (e.g., v0.12.1). Defaults to latest release."
        required: false
        type: string

jobs:
  update-wiki:
    name: Update wiki version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Update version in Home.md
        working-directory: wiki
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "::error::No version tag found"
            exit 1
          fi
          sed -i "s|\*\*Current:\*\* v[0-9]*\.[0-9]*\.[0-9]*[^ ]*|\*\*Current:\*\* ${TAG}|" Home.md
          echo "Updated Home.md to version ${TAG}"
          grep "Current:" Home.md

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add Home.md
          git commit -m "docs: update version to ${{ steps.version.outputs.tag }}"
          git push
