info:
  contact:
    email: admin@your-registry.example.com
    name: Registry Support
  description: Complete Terraform Module and Provider Registry with SCM integration,
    mirrors, and storage backends
  license:
    name: Apache-2.0
  termsOfService: https://your-registry.example.com/terms
  title: Terraform Registry API
  version: 1.0.0
paths:
  /.well-known/terraform.json:
    get:
      description: Implements the Terraform service discovery protocol. Returns the
        base URLs for the Module Registry and Provider Registry endpoints.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ServiceDiscoveryResponse'
      summary: Terraform service discovery
      tags:
      - System
  /api/v1/admin/advisories:
    get:
      description: Returns all advisories including withdrawn ones. Requires admin
        scope.
      parameters:
      - description: 'Filter by target kind: binary, provider, scanner'
        in: query
        name: kind
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — admin scope required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List all CVE advisories (admin)
      tags:
      - Vulnerability Advisories
  /api/v1/admin/advisories/poll:
    post:
      description: Queues an immediate CVE poll pass outside the normal schedule.
        Requires admin scope.
      produces:
      - application/json
      responses:
        "202":
          description: Poll queued
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — admin scope required
          schema:
            additionalProperties: true
            type: object
        "503":
          description: CVE poll job not running
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Trigger a CVE poll (admin)
      tags:
      - Vulnerability Advisories
  /api/v1/admin/approvals:
    get:
      description: List mirror approval requests, optionally filtered by organization
        or status. Requires admin scope.
      parameters:
      - description: Filter by organization ID (UUID)
        in: query
        name: organization_id
        type: string
      - description: Filter by status (pending, approved, rejected)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MirrorApprovalRequest'
            type: array
        "400":
          description: Invalid organization ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List approval requests
      tags:
      - RBAC
    post:
      consumes:
      - application/json
      description: Create a new mirror provider approval request. Requires admin scope.
      parameters:
      - description: Approval request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.CreateApprovalRequestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid request or mirror config ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Create approval request
      tags:
      - RBAC
  /api/v1/admin/approvals/{id}:
    get:
      description: Returns a specific mirror approval request by ID. Requires admin
        scope.
      parameters:
      - description: Approval request ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid approval request ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Approval request not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get approval request
      tags:
      - RBAC
  /api/v1/admin/approvals/{id}/review:
    put:
      consumes:
      - application/json
      description: Approve or reject a mirror provider approval request. Requires
        admin scope.
      parameters:
      - description: Approval request ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Review decision (status: approved or rejected)'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.ReviewApprovalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid ID or status value
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Review approval request
      tags:
      - RBAC
  /api/v1/admin/approvals/{id}/token:
    post:
      description: Generates a single-use HMAC token that can be sent to an approver
        via email
      parameters:
      - description: Approval request ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/admin.ApprovalTokenResponse'
        "400":
          description: Invalid approval request ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — mirrors:manage scope required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Approval request not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Generate webhook approval token
      tags:
      - RBAC
  /api/v1/admin/audit-logs:
    get:
      consumes:
      - application/json
      description: Get a paginated, filterable list of audit log entries. Requires
        audit:read scope.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page, max 200 (default 25)
        in: query
        name: per_page
        type: integer
      - description: Filter by action string (exact match)
        in: query
        name: action
        type: string
      - description: Filter by resource type (module, provider, user, mirror, api_key,
          organization)
        in: query
        name: resource_type
        type: string
      - description: Filter by actor user ID (exact match)
        in: query
        name: user_id
        type: string
      - description: Filter by actor email (partial, case-insensitive)
        in: query
        name: user_email
        type: string
      - description: Filter entries at or after this RFC3339 timestamp
        in: query
        name: start_date
        type: string
      - description: Filter entries at or before this RFC3339 timestamp
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AuditLogListResponse'
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — audit:read scope required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List audit logs
      tags:
      - Audit
  /api/v1/admin/audit-logs/{id}:
    get:
      description: Retrieve a single audit log entry by ID. Requires audit:read scope.
      parameters:
      - description: Audit log entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AuditLogResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — audit:read scope required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Audit log entry not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get audit log entry
      tags:
      - Audit
  /api/v1/admin/audit-logs/export:
    get:
      description: Streams audit log entries as newline-delimited JSON (NDJSON) or
        OCSF 1.1 API
      parameters:
      - description: 'Start date in RFC3339 format (default: 30 days ago)'
        in: query
        name: start_date
        type: string
      - description: 'End date in RFC3339 format (default: now)'
        in: query
        name: end_date
        type: string
      - description: 'Output format: ndjson (default) or ocsf'
        enum:
        - ndjson
        - ocsf
        in: query
        name: format
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: NDJSON stream of audit log entries
          schema:
            type: string
        "400":
          description: Invalid date or format parameters
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — audit:read scope required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Export audit logs
      tags:
      - Audit
  /api/v1/admin/identity/group-mappings:
    get:
      description: Returns read-only SAML and LDAP group-to-role mapping configuration.
        OIDC mappings are managed separately via the OIDC admin endpoints.
      produces:
      - application/json
      responses:
        "200":
          description: SAML and LDAP group mapping config
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden — requires admin scope
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Identity group mappings
      tags:
      - Authentication
  /api/v1/admin/mirrors:
    get:
      description: List all provider mirror configurations, optionally filtered to
        enabled only. Requires admin scope.
      parameters:
      - description: Filter to enabled mirrors only
        in: query
        name: enabled
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.ListMirrorConfigsResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List mirror configurations
      tags:
      - Mirror
    post:
      consumes:
      - application/json
      description: Create a new provider mirror configuration. Requires admin scope.
      parameters:
      - description: Mirror configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateMirrorConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MirrorConfiguration'
        "400":
          description: Invalid request or registry URL
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
