info:
  contact:
    email: admin@your-registry.example.com
    name: Registry Support
  description: Complete Terraform Module and Provider Registry with SCM integration,
    mirrors, and storage backends
  license:
    name: Apache-2.0
  termsOfService: https://your-registry.example.com/terms
  title: Terraform Registry API
  version: 1.0.0
paths:
  /.well-known/terraform.json:
    get:
      description: Implements the Terraform service discovery protocol. Returns the
        base URLs for the Module Registry and Provider Registry endpoints.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ServiceDiscoveryResponse'
      summary: Terraform service discovery
      tags:
      - System
  /api/v1/admin/approvals:
    get:
      description: List mirror approval requests, optionally filtered by organization
        or status. Requires admin scope.
      parameters:
      - description: Filter by organization ID (UUID)
        in: query
        name: organization_id
        type: string
      - description: Filter by status (pending, approved, rejected)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MirrorApprovalRequest'
            type: array
        "400":
          description: Invalid organization ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List approval requests
      tags:
      - RBAC
    post:
      consumes:
      - application/json
      description: Create a new mirror provider approval request. Requires admin scope.
      parameters:
      - description: Approval request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.CreateApprovalRequestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid request or mirror config ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Create approval request
      tags:
      - RBAC
  /api/v1/admin/approvals/{id}:
    get:
      description: Returns a specific mirror approval request by ID. Requires admin
        scope.
      parameters:
      - description: Approval request ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid approval request ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Approval request not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Get approval request
      tags:
      - RBAC
  /api/v1/admin/approvals/{id}/review:
    put:
      consumes:
      - application/json
      description: Approve or reject a mirror provider approval request. Requires
        admin scope.
      parameters:
      - description: Approval request ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Review decision (status: approved or rejected)'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.ReviewApprovalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MirrorApprovalRequest'
        "400":
          description: Invalid ID or status value
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Review approval request
      tags:
      - RBAC
  /api/v1/admin/mirrors:
    get:
      description: List all provider mirror configurations, optionally filtered to
        enabled only. Requires admin scope.
      parameters:
      - description: Filter to enabled mirrors only
        in: query
        name: enabled
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.ListMirrorConfigsResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: List mirror configurations
      tags:
      - Mirror
    post:
      consumes:
      - application/json
      description: Create a new provider mirror configuration. Requires admin scope.
      parameters:
      - description: Mirror configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateMirrorConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MirrorConfiguration'
        "400":
          description: Invalid request or registry URL
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Mirror with this name already exists
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Create mirror configuration
      tags:
      - Mirror
  /api/v1/admin/mirrors/{id}:
    delete:
      description: Delete a provider mirror configuration and its sync history. Requires
        admin scope.
      parameters:
      - description: Mirror configuration ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.MessageResponse'
        "400":
          description: Invalid mirror ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Delete mirror configuration
      tags:
      - Mirror
    get:
      description: Retrieve a specific mirror configuration by ID. Requires admin
        scope.
      parameters:
      - description: Mirror configuration ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MirrorConfiguration'
        "400":
