run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - gosimple
    - unused
  disable:
    - exhaustruct
    - wrapcheck

linters-settings:
  errcheck:
    exclude-functions:
      - (*github.com/gin-gonic/gin.Context).Error
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
