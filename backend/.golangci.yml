version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - unused
  disable:
    - exhaustruct
    - wrapcheck
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/gin-gonic/gin.Context).Error
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
