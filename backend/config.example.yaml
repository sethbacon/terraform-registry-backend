server:
  host: 0.0.0.0
  port: 8080
  base_url: http://localhost:8080
  # public_url is the externally-reachable URL used for OAuth callback URLs and post-OAuth
  # redirects. Set this when the backend is deployed behind a reverse proxy (e.g. nginx or
  # Kubernetes ingress) where the public address differs from the internal listen address.
  # Defaults to base_url when unset.
  # public_url: https://registry.example.com
  read_timeout: 30s
  write_timeout: 30s

# OpenAPI / Swagger spec metadata — customisable at deploy time without recompiling.
# These values override the defaults baked into the binary when non-empty.
# They appear in the info block of GET /swagger.json and are displayed in the
# API Documentation page under the spec title.
api_docs:
  # URL to your deployment's Terms of Service page.
  # Example: https://registry.example.com/terms
  terms_of_service: ""

  # Display name shown next to the support email link in the spec.
  # Example: Registry Support
  contact_name: ""

  # Support email address shown in the spec and API docs page.
  # Set this to your team's inbox so users know where to send API questions.
  # Example: registry-support@example.com
  contact_email: ""

  # SPDX license identifier for the API itself (not the software).
  # Defaults to Apache-2.0.  Only change if you re-license your registry deployment.
  # Example: MIT
  license: ""

# Redis configuration (optional, enables HA features)
# When configured, rate limiting and OIDC session state are stored in Redis
# instead of in-memory, enabling correct behavior across multiple pods.
# If redis.host is empty or unset, the backend falls back to in-memory stores
# (suitable for single-instance deployments only).
redis:
  host: ""                         # e.g. redis.example.com or 10.0.0.5
  port: 6379
  password: ${REDIS_PASSWORD}      # leave blank if Redis has no auth
  db: 0                            # Redis database number
  tls: false                       # enable TLS for Redis connection
  pool_size: 10                    # connection pool size
  dial_timeout: 5s                 # timeout for establishing new connections

database:
  host: localhost
  port: 5432
  name: terraform_registry
  user: registry
  password: ${DATABASE_PASSWORD}
  ssl_mode: prefer
  max_connections: 25

storage:
  default_backend: local  # Options: azure, s3, local

  azure:
    account_name: ${AZURE_STORAGE_ACCOUNT}
    account_key: ${AZURE_STORAGE_KEY}
    container_name: terraform-registry
    cdn_url: ""  # Optional CDN URL for faster downloads

  s3:
    endpoint: https://s3.amazonaws.com
    region: us-east-1
    bucket: terraform-registry
    access_key_id: ${AWS_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SECRET_ACCESS_KEY}

  local:
    base_path: ./storage
    serve_directly: true  # Serve files directly instead of redirecting

auth:
  # API key authentication (recommended for CLI and automation)
  api_keys:
    enabled: true
    prefix: "tfr_"  # All API keys will start with this prefix

  # Generic OIDC provider (Okta, Auth0, Google, etc.)
  oidc:
    enabled: false
    issuer_url: https://accounts.google.com
    client_id: ${OIDC_CLIENT_ID}
    client_secret: ${OIDC_CLIENT_SECRET}
    redirect_url: http://localhost:8080/auth/callback
    scopes:
      - openid
      - email
      - profile

  # Azure AD / Entra ID specific configuration
  azure_ad:
    enabled: false
    tenant_id: ${AZURE_TENANT_ID}
    client_id: ${AZURE_CLIENT_ID}
    client_secret: ${AZURE_CLIENT_SECRET}
    redirect_url: http://localhost:8080/auth/azure/callback

  # SAML 2.0 configuration
  saml:
    enabled: false
    entity_id: https://registry.example.com
    acs_url: https://registry.example.com/api/v1/auth/saml/acs
    # cert_file: /etc/certs/saml-sp.crt
    # key_file: /etc/certs/saml-sp.key
    idps:
      - name: okta
        metadata_url: https://your-org.okta.com/app/XXXXXXXX/sso/saml/metadata
    group_attribute_name: memberOf
    group_mappings: []
    default_role: ""

  # LDAP / Active Directory configuration
  ldap:
    enabled: false
    host: ldap.example.com
    port: 389
    use_tls: false
    start_tls: true
    insecure_skip_verify: false
    bind_dn: cn=svc-registry,ou=service-accounts,dc=example,dc=com
    bind_password: ${LDAP_BIND_PASSWORD}
    base_dn: dc=example,dc=com
    user_filter: "(sAMAccountName=%s)"
    user_attr_email: mail
    user_attr_name: displayName
    group_base_dn: ou=groups,dc=example,dc=com
    group_filter: ""
    group_member_attr: member
    group_mappings: []
    default_role: ""

multi_tenancy:
  enabled: false  # Set to true for multi-organization support
  default_organization: default
  allow_public_signup: false  # Allow users to create organizations

security:
  cors:
    allowed_origins:
      - http://localhost:5173  # Vite dev server
      - http://localhost:8080
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS

  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst: 10
    # Per-organization aggregate rate limiting (requires multi-tenancy).
    # When set, each organization is limited to this aggregate rate across
    # all its users. Individual per-user limits still apply within the org.
    # Set to 0 to disable org-level limiting.
    org_requests_per_minute: 0
    org_burst: 0
    # Per-principal rate limit overrides (keyed by "user:<id>" or "apikey:<id>").
    # Allows admins to grant higher or lower limits to specific principals.
    # principal_overrides:
    #   "user:high-volume-service-account-id":
    #     requests_per_minute: 600
    #     burst: 100
    #   "apikey:ci-pipeline-key-id":
    #     requests_per_minute: 300
    #     burst: 50

  tls:
    enabled: false
    cert_file: /etc/certs/tls.crt
    key_file: /etc/certs/tls.key

  # Mutual TLS (mTLS) client certificate authentication for machine-to-machine callers.
  # When enabled, clients presenting a valid certificate signed by the configured CA
  # are authenticated and assigned scopes based on the certificate subject mapping.
  mtls:
    enabled: false
    client_ca_file: /etc/certs/client-ca.crt
    # mappings:
    #   - subject: "CN=terraform-ci"
    #     scopes: ["modules:read", "providers:read"]
    #   - subject: "CN=release-pipeline"
    #     scopes: ["modules:write", "providers:write"]

logging:
  level: info  # Options: debug, info, warn, error
  format: json  # Options: json, text
  output: stdout  # Options: stdout, or file path like /var/log/registry.log

telemetry:
  enabled: true
  service_name: terraform-registry

  metrics:
    enabled: true
    prometheus_port: 9090

  tracing:
    enabled: false
    jaeger_endpoint: http://jaeger:14268/api/traces

  profiling:
    enabled: false
    port: 6060

# Outbound notification emails (e.g. API key expiry warnings)
notifications:
  enabled: false  # Set to true to enable email alerts

  smtp:
    host: smtp.example.com  # e.g. smtp.sendgrid.net, smtp.mailgun.org
    port: 587               # 587 = STARTTLS, 465 = SMTPS, 25 = plain
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: "Terraform Registry <no-reply@example.com>"
    use_tls: true           # true enables TLS (STARTTLS on 587 or SMTPS on 465)

  # Days before expiry to send the first warning email (default: 7)
  api_key_expiry_warning_days: 7

  # How often to run the expiry check (hours, default: 24)
  api_key_expiry_check_interval_hours: 24

# Audit log retention
audit_retention:
  retention_days: 90        # Days to keep audit logs (0 = keep forever)
  cleanup_batch_size: 1000  # Number of records to delete per batch

# Webhook retry configuration
# When a webhook-triggered publish fails, the event can be retried automatically
# with exponential backoff. Set max_retries to 0 to disable retries.
webhooks:
  max_retries: 3            # Maximum number of retry attempts (0 = disabled)
  retry_interval_mins: 2    # How often the retry job polls for retryable events
